name: build

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'garage-env/**'
      - 'wyoming-kokoro-cpu/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      image:
        description: "Which image to (re)build (default: all)"
        required: false
        default: all
        type: choice
        options:
          - all
          - garage-env
          - wyoming-kokoro-cpu

permissions:
  contents: read
  packages: write

jobs:
  # Detect which subdirectories changed in the push so we only build what
  # needs rebuilding. Manual workflow_dispatch always builds the selected
  # image (or all).
  changes:
    runs-on: ubuntu-latest
    outputs:
      garage-env: ${{ steps.filter.outputs.garage-env }}
      wyoming-kokoro-cpu: ${{ steps.filter.outputs.wyoming-kokoro-cpu }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            garage-env:
              - 'garage-env/**'
            wyoming-kokoro-cpu:
              - 'wyoming-kokoro-cpu/**'

  build-push:
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: garage-env
            platforms: linux/amd64,linux/arm64
          - name: wyoming-kokoro-cpu
            platforms: linux/amd64
    steps:
      - name: Decide whether this matrix entry runs
        id: gate
        run: |
          # workflow_dispatch with a specific image: run only that one
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            sel="${{ inputs.image }}"
            if [ "$sel" = "all" ] || [ "$sel" = "${{ matrix.image.name }}" ]; then
              echo "run=true" >> $GITHUB_OUTPUT
            else
              echo "run=false" >> $GITHUB_OUTPUT
            fi
          # tag pushes (v*): build everything
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          # branch push: only build images whose subdir changed
          else
            changed='${{ toJSON(needs.changes.outputs) }}'
            case "${{ matrix.image.name }}" in
              garage-env)         flag="${{ needs.changes.outputs.garage-env }}" ;;
              wyoming-kokoro-cpu) flag="${{ needs.changes.outputs.wyoming-kokoro-cpu }}" ;;
            esac
            if [ "$flag" = "true" ]; then
              echo "run=true" >> $GITHUB_OUTPUT
            else
              echo "run=false" >> $GITHUB_OUTPUT
            fi
          fi

      - if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v6

      - if: steps.gate.outputs.run == 'true'
        uses: docker/setup-qemu-action@v4
      - if: steps.gate.outputs.run == 'true'
        uses: docker/setup-buildx-action@v4

      - if: steps.gate.outputs.run == 'true'
        name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - if: steps.gate.outputs.run == 'true'
        name: Derive tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - if: steps.gate.outputs.run == 'true'
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.name }}
          platforms: ${{ matrix.image.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
